{% extends "base.html" %}
{% block content %}

<h3>Branches</h3>

<form method="post" action="{{ url_for('branch_add') }}">
    <input name="branch_name" placeholder="Branch Name" required>
    <input name="location" placeholder="Location">
    <input name="contact_number" placeholder="Contact Number">
    <button type="submit">Add Branch</button>
</form>

<table>
  <tr>
    <th>ID</th>
    <th>Branch Name</th>
    <th>Location</th>
    <th>Contact Number</th>
    <th>Actions</th>
  </tr>

  {% for b in branches %}
  <tr>
    <td>{{ b.id }}</td>
    <td>{{ b.branch_name }}</td>
    <td>{{ b.location or '-' }}</td>
    <td>{{ b.contact_number or '-' }}</td>
    <td>
      <a href="{{ url_for('branch_edit', branch_id=b.id) }}">Edit</a>
      |
      <form action="{{ url_for('branch_delete', branch_id=b.id) }}" method="post" style="display:inline;">
        <button type="submit" onclick="return confirm('Delete this branch?')">Delete</button>
      </form>
    </td>
  </tr>
  {% endfor %}
</table>

{% endblock %}
